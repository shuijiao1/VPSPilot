name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: docker build -f telegram-bot/Dockerfile -t ghcr.io/${{ github.repository_owner }}/guko:latest -t ghcr.io/${{ github.repository_owner }}/guko:${{ github.sha }} .
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/guko:latest
          docker push ghcr.io/${{ github.repository_owner }}/guko:${{ github.sha }}
